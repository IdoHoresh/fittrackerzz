<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#0a0e17">
<title>FitTrack — עידו</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMGExMDFhIi8+PHRleHQgeD0iOTAiIHk9IjExNSIgZm9udC1zaXplPSI5MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iIzRjYWY1MCI+8J+Prjwv dGV4dD48L3N2Zz4=">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e17;--bg2:#111827;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--green:#4caf50;--blue:#3b82f6;--orange:#ff9800;--yellow:#eab308;--red:#ef4444;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;overscroll-behavior:none}
input{font-family:'Heebo',sans-serif;direction:rtl}
input:focus{outline:none}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* Header */
.header{background:linear-gradient(135deg,#1a2332,#0f1729);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 8px) 16px 10px;flex-shrink:0;z-index:100}
.header-inner{display:flex;justify-content:space-between;align-items:center;max-width:600px;margin:0 auto}
.logo span:first-child{color:var(--green);font-weight:900;font-size:16px}
.logo span:last-child{color:var(--text2);font-weight:700;font-size:16px}
.tabs{display:flex;gap:4px}
.tab{background:transparent;border:1px solid transparent;color:var(--text2);border-radius:8px;padding:6px 14px;font-size:13px;font-family:'Heebo';font-weight:500;cursor:pointer}
.tab.active{background:rgba(76,175,80,0.2);border-color:rgba(76,175,80,0.4);color:var(--green)}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px;padding-bottom:calc(var(--safe-bottom) + 20px)}
.content-inner{max-width:600px;margin:0 auto}

/* Date Nav */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 6px}
.date-nav button{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--text2);border-radius:10px;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.date-nav button:active{background:rgba(255,255,255,0.1)}
.date-center{text-align:center}
.date-center h2{font-size:22px;font-weight:700}
.date-center .sub{font-size:13px;color:var(--text3);margin-top:2px}

/* Badge */
.badges{display:flex;gap:8px;justify-content:center;margin:12px 0 14px;flex-wrap:wrap}
.badge{border-radius:12px;padding:7px 16px;display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px}
.badge-workout{background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.3);color:var(--green)}
.badge-rest{background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.3);color:var(--yellow)}
.badge-aerobic{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.3);color:var(--blue);font-size:12px;font-weight:600}

/* Progress */
.progress-box{background:var(--card);border-radius:14px;padding:12px 16px;border:1px solid var(--border);margin-bottom:12px}
.progress-top{display:flex;justify-content:space-between;margin-bottom:7px;font-size:13px}
.progress-label{color:var(--text2);font-weight:500}
.progress-val{font-weight:700}
.progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s ease}

/* Weight input */
.weight-box{background:var(--card);border-radius:14px;padding:12px 16px;border:1px solid var(--border);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.weight-box input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px}
.weight-box input:focus{border-color:var(--green)}
.weight-btn{border:none;border-radius:8px;padding:8px 16px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Heebo'}
.weight-btn.ready{background:linear-gradient(135deg,#4caf50,#45a049)}
.weight-btn.idle{background:rgba(255,255,255,0.06);opacity:0.4}

/* Timeline */
.timeline{position:relative;padding-right:4px}
.timeline::before{content:'';position:absolute;right:19px;top:16px;bottom:16px;width:2px;background:linear-gradient(180deg,rgba(76,175,80,0.3),rgba(59,130,246,0.2),rgba(100,100,100,0.1))}

.tl-item{display:flex;gap:12px;margin-bottom:6px}
.tl-dot{width:40px;min-width:40px;display:flex;flex-direction:column;align-items:center;padding-top:14px;position:relative;z-index:2}
.check{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;cursor:pointer;transition:transform 0.15s}
.check:active{transform:scale(0.9)}

.tl-card{flex:1;border-radius:14px;padding:13px 15px;cursor:pointer;transition:opacity 0.2s}
.tl-card.done{opacity:0.55}
.tl-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.tl-card-main{display:flex;align-items:center;gap:9px}
.tl-card-icon{font-size:19px}
.tl-card-label{font-weight:600;font-size:13.5px}
.tl-card-label.done{text-decoration:line-through;color:var(--text3)}
.tl-card-time{font-size:11.5px;color:var(--text3);font-weight:500;direction:ltr}
.tl-card-badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:4px;margin-top:3px;display:inline-block}
.detail-box{margin-top:9px;padding:9px 11px;background:rgba(0,0,0,0.2);border-radius:9px;font-size:12px;line-height:1.8;color:var(--text2);white-space:pre-line}
.note-display{margin-top:7px;padding:5px 9px;border-radius:7px;background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.2);font-size:11.5px;color:var(--yellow)}
.note-actions{margin-top:7px;display:flex;gap:5px}
.note-actions button{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:4px 11px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'Heebo'}
.note-actions button:active{background:rgba(255,255,255,0.08)}
.note-edit{margin-top:7px}
.note-edit input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(234,179,8,0.3);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px}
.note-edit input:focus{border-color:var(--yellow)}
.note-edit-btns{display:flex;gap:5px;margin-top:5px}
.note-save{background:rgba(76,175,80,0.2)!important;border-color:rgba(76,175,80,0.3)!important;color:var(--green)!important}

/* Water */
.water-box{margin-top:16px;background:rgba(59,130,246,0.06);border-radius:14px;border:1px solid rgba(59,130,246,0.15);padding:13px 16px;display:flex;align-items:center;gap:11px;margin-bottom:20px}
.water-box .icon{font-size:22px}
.water-box .title{font-weight:600;font-size:13px;color:#60a5fa}
.water-box .sub{font-size:11.5px;color:var(--text3);margin-top:2px}

/* Weight View */
.weight-view{padding-top:16px}
.weight-view h2{font-size:20px;font-weight:700;margin-bottom:14px;text-align:center}
.empty-state{text-align:center;padding:36px;color:var(--text3);background:var(--card);border-radius:16px;border:1px solid var(--border)}
.empty-state .icon{font-size:38px;margin-bottom:10px}
.chart-box{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--border);text-align:center}
.stat-label{font-size:11.5px;color:var(--text3);margin-bottom:3px}
.stat-val{font-size:19px;font-weight:700}
.stat-unit{font-size:10.5px;color:var(--text3)}
.history-list{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.history-item:last-child{border-bottom:none}
.history-date{font-size:12.5px;color:var(--text2)}
.history-weight{font-size:14px;font-weight:600}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.35s ease both}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const CYCLE=["upper","lower","rest"],CYCLE_LABELS={upper:"עליון",lower:"תחתון",rest:"מנוחה"},CYCLE_EMOJI={upper:"💪",lower:"🦵",rest:"😴"},START="2026-04-05";
const SCHEDULE=[
{id:"wake",time:"07:30",label:"השכמה",icon:"☀️",cat:"routine",detail:""},
{id:"meal1",time:"07:45",label:"ארוחת בוקר",icon:"🍳",cat:"meal",detail:"2 פרוסות לחם מלא / 5 פריכיות אורז\nקוטג׳ 2% / גבינה לבנה / טונה+ביצה\n1 ירק ירוק | 2 קפה + חלב"},
{id:"work",time:"08:00",label:"יציאה לעבודה",icon:"💼",cat:"routine",detail:""},
{id:"meal2",time:"12:30",label:"ארוחת צהריים",icon:"🥗",cat:"meal",detail:"200 ג׳ אורז/בורגול/כוסמת/קינואה/עדשים\n250 ג׳ עוף/הודו/דג (140 סלמון)\n2 ירקות (1 ירוק לפחות)"},
{id:"meal3",time:"16:00",label:"ארוחת ביניים",icon:"🥜",cat:"meal",detail:"פרי / 2 תמרים / חטיף עד 100 קל׳\n15 שקדים / 7 חצאי אגוז מלך\nיוגורט חלבון 110 קל׳"},
{id:"meal4",time:"19:00",label:"ארוחת ערב",icon:"🍽️",cat:"meal",detail:"2 פרוסות לחם / 5 פריכיות אורז\nביצה שלמה | חצי קוטג׳/גבינה/טונה\n2 ירקות | טחינה/חמאת בוטנים/אבוקדו"},
{id:"workout",time:"20:00",label:"אימון",icon:"🏋️",cat:"workout",detail:""},
{id:"shake",time:"22:30",label:"שייק אחרי אימון",icon:"🥤",cat:"meal",detail:"סקופ חלבון + 2 תמרים / בננה\n(ביום מנוחה: חלבון בלבד)"},
{id:"meal5",time:"23:15",label:"ארוחת לילה",icon:"🌙",cat:"meal",detail:"יוגורט חלבון 110 קל׳"},
{id:"sleep",time:"01:00",label:"שינה",icon:"😴",cat:"routine",detail:"לפחות 7 שעות רצופות"}
];
const CAT_COLORS={meal:{bg:"rgba(255,152,0,0.07)",accent:"#ff9800",border:"rgba(255,152,0,0.2)"},workout:{bg:"rgba(76,175,80,0.07)",accent:"#4caf50",border:"rgba(76,175,80,0.2)"},routine:{bg:"rgba(100,140,180,0.05)",accent:"#6a8fb5",border:"rgba(100,140,180,0.15)"}};
const DAYS=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

function dateStr(d){return d.toISOString().split("T")[0]}
function dayName(d){return DAYS[d.getDay()]}
function cycleType(ds){const diff=Math.floor((new Date(ds)-new Date(START))/864e5);return CYCLE[((diff%3)+3)%3]}
function hasAerobic(ds){const diff=Math.floor((new Date(ds)-new Date(START))/864e5);const c=((diff%6)+6)%6;return c<3&&CYCLE[c%3]!=="rest"}

// Storage
const DB_NAME="fittrack";const DB_VER=1;let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains("days"))d.createObjectStore("days",{keyPath:"date"})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=e=>rej(e)})}
function dbGet(date){return new Promise((res,rej)=>{const tx=db.transaction("days","readonly");const s=tx.objectStore("days");const r=s.get(date);r.onsuccess=()=>res(r.result||null);r.onerror=e=>rej(e)})}
function dbPut(data){return new Promise((res,rej)=>{const tx=db.transaction("days","readwrite");const s=tx.objectStore("days");const r=s.put(data);r.onsuccess=()=>res();r.onerror=e=>rej(e)})}
function dbGetAll(){return new Promise((res,rej)=>{const tx=db.transaction("days","readonly");const s=tx.objectStore("days");const r=s.getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=e=>rej(e)})}

// State
let state={date:new Date(),view:"today",dayData:null,weightHistory:[],showDetail:null,editingNote:null,noteText:"",weightInput:""};

function defaultDay(ds){return{date:ds,completed:{},notes:{},weight:"",workoutType:cycleType(ds),hasAerobic:hasAerobic(ds)}}

async function loadDay(){
  const ds=dateStr(state.date);
  const data=await dbGet(ds);
  state.dayData=data||defaultDay(ds);
  render();
}
async function saveDay(){await dbPut(state.dayData);render()}
async function loadWeights(){
  const all=await dbGetAll();
  state.weightHistory=all.filter(d=>d.weight).map(d=>({date:d.date,weight:parseFloat(d.weight)})).sort((a,b)=>a.date.localeCompare(b.date));
}

function toggleComplete(id){
  state.dayData.completed[id]=!state.dayData.completed[id];
  saveDay();
}
function saveNote(id){
  state.dayData.notes[id]=state.noteText;
  state.editingNote=null;state.noteText="";
  saveDay();
}
async function saveWeight(){
  if(!state.weightInput)return;
  state.dayData.weight=state.weightInput;
  state.weightInput="";
  await dbPut(state.dayData);
  await loadWeights();
  render();
}
function changeDate(off){
  const d=new Date(state.date);d.setDate(d.getDate()+off);
  state.date=d;state.showDetail=null;state.editingNote=null;
  loadDay();
}

function render(){
  const ds=dateStr(state.date);
  const ct=cycleType(ds);
  const aero=hasAerobic(ds);
  const isRest=ct==="rest";
  const d=state.dayData;
  if(!d)return;

  const completed=SCHEDULE.filter(s=>d.completed[s.id]).length;
  const total=SCHEDULE.length;
  const pct=total>0?(completed/total)*100:0;

  let html="";

  // Header
  html+=`<div class="header"><div class="header-inner">
    <div class="tabs">
      <button class="tab ${state.view==="today"?"active":""}" onclick="setState('view','today')">📋 יומי</button>
      <button class="tab ${state.view==="weight"?"active":""}" onclick="setState('view','weight');loadWeights().then(render)">⚖️ משקל</button>
    </div>
    <div class="logo"><span>FIT</span><span>TRACK</span></div>
  </div></div>`;

  html+=`<div class="content"><div class="content-inner">`;

  if(state.view==="today"){
    // Date nav
    html+=`<div class="date-nav">
      <button onclick="changeDate(-1)">→</button>
      <div class="date-center"><h2>יום ${dayName(state.date)}</h2><div class="sub">${ds}</div></div>
      <button onclick="changeDate(1)">←</button>
    </div>`;

    // Badges
    html+=`<div class="badges">
      <div class="badge ${isRest?"badge-rest":"badge-workout"}">
        <span style="font-size:18px">${CYCLE_EMOJI[ct]}</span>
        ${isRest?"יום מנוחה":"אימון "+CYCLE_LABELS[ct]}
      </div>
      ${aero&&!isRest?`<div class="badge badge-aerobic"><span>🏃</span> 30 דק׳ אירובי</div>`:""}
    </div>`;

    // Progress
    html+=`<div class="progress-box">
      <div class="progress-top"><span class="progress-label">התקדמות יומית</span><span class="progress-val" style="color:${pct===100?"var(--green)":"var(--text)"}">${completed}/${total} ${pct===100?"✅":""}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct===100?"linear-gradient(90deg,#4caf50,#66bb6a)":"linear-gradient(90deg,#3b82f6,#60a5fa)"}"></div></div>
    </div>`;

    // Weight input
    html+=`<div class="weight-box">
      <span style="font-size:18px">⚖️</span>
      <input type="number" step="0.1" id="weightIn" placeholder="${d.weight?d.weight+' ק"ג ✓':'משקל בוקר (ק"ג)'}" value="${state.weightInput}" oninput="state.weightInput=this.value;updateWeightBtn()">
      <button class="weight-btn ${state.weightInput?"ready":"idle"}" id="weightBtn" onclick="saveWeight()">שמור</button>
    </div>`;

    // Timeline
    html+=`<div class="timeline">`;
    SCHEDULE.forEach((item,idx)=>{
      const done=d.completed[item.id];
      const note=d.notes[item.id];
      const col=CAT_COLORS[item.cat];
      const open=state.showDetail===item.id;
      const editing=state.editingNote===item.id;
      const isW=item.id==="workout";
      const wDetail=isW?(isRest?"יום מנוחה — אין אימון היום":`אימון ${CYCLE_LABELS[ct]}${aero?" + 30 דק׳ אירובי (דופק 130-140)":""}\nסדר: משקולות ← אירובי`):item.detail;

      html+=`<div class="tl-item fade-up" style="animation-delay:${idx*0.03}s">
        <div class="tl-dot">
          <div class="check" onclick="toggleComplete('${item.id}')" style="background:${done?col.accent:"rgba(255,255,255,0.04)"};border:2px solid ${done?col.accent:"rgba(255,255,255,0.15)"}">
            ${done?"✓":""}
          </div>
        </div>
        <div class="tl-card ${done?"done":""}" onclick="toggleDetail('${item.id}')" style="background:${col.bg};border:1px solid ${done?col.accent+"40":col.border}">
          <div class="tl-card-top">
            <div class="tl-card-main">
              <span class="tl-card-icon">${item.icon}</span>
              <div>
                <div class="tl-card-label ${done?"done":""}">${item.label}</div>
                ${isW&&!isRest?`<span class="tl-card-badge" style="color:${col.accent};background:${col.accent}15">${CYCLE_LABELS[ct]}${aero?" + אירובי":""}</span>`:""}
              </div>
            </div>
            <span class="tl-card-time">${item.time}</span>
          </div>
          ${open&&wDetail?`<div class="detail-box">${wDetail.replace(/\n/g,"<br>")}</div>`:""}
          ${note?`<div class="note-display">📝 ${note}</div>`:""}
          ${open?`<div class="note-actions">
            <button onclick="event.stopPropagation();startEdit('${item.id}','${(note||"").replace(/'/g,"\\'")}')">${note?"✏️ ערוך הערה":"📝 הוסף הערה"}</button>
          </div>`:""}
          ${editing?`<div class="note-edit" onclick="event.stopPropagation()">
            <input id="noteInput" value="${state.noteText.replace(/"/g,"&quot;")}" oninput="state.noteText=this.value" onkeydown="if(event.key==='Enter')saveNote('${item.id}')" placeholder="מה שינית? (למשל: אכלתי טונה במקום עוף)">
            <div class="note-edit-btns">
              <button class="note-save" onclick="saveNote('${item.id}')">שמור</button>
              <button onclick="state.editingNote=null;state.noteText='';render()">ביטול</button>
            </div>
          </div>`:""}
        </div>
      </div>`;
    });
    html+=`</div>`;

    // Water
    html+=`<div class="water-box">
      <span class="icon">💧</span>
      <div><div class="title">תזכורת מים</div><div class="sub">לפחות 3 ליטר + 500-750 מ"ל על שעת אימון</div></div>
    </div>`;

  } else {
    // Weight view
    html+=`<div class="weight-view"><h2>⚖️ מעקב משקל</h2>`;
    const wh=state.weightHistory;
    if(wh.length===0){
      html+=`<div class="empty-state"><div class="icon">⚖️</div><div style="font-size:15px">עדיין אין נתוני משקל</div><div style="font-size:13px;margin-top:6px">הזן את המשקל שלך בתצוגה היומית</div></div>`;
    } else {
      // Chart
      html+=`<div class="chart-box">`;
      const data=wh.slice(-30);
      if(data.length<2){
        html+=`<div style="color:var(--text3);text-align:center;padding:20px">צריך לפחות 2 מדידות לגרף</div>`;
      } else {
        const mn=Math.min(...data.map(d=>d.weight))-1;
        const mx=Math.max(...data.map(d=>d.weight))+1;
        const rng=mx-mn||1;
        const w=520,h=180;
        const pts=data.map((d,i)=>({x:(i/(data.length-1))*(w-60)+40,y:h-20-((d.weight-mn)/rng)*(h-40),...d}));
        const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
        const area=`${path} L${pts[pts.length-1].x},${h-20} L${pts[0].x},${h-20} Z`;
        let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">`;
        [0,.25,.5,.75,1].forEach(f=>{
          const y=h-20-f*(h-40);const v=(mn+f*rng).toFixed(1);
          svg+=`<line x1="40" y1="${y}" x2="${w-20}" y2="${y}" stroke="rgba(255,255,255,0.05)"/>`;
          svg+=`<text x="35" y="${y+4}" fill="#64748b" font-size="10" text-anchor="end" font-family="Heebo">${v}</text>`;
        });
        svg+=`<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4caf50" stop-opacity="0.3"/><stop offset="100%" stop-color="#4caf50" stop-opacity="0"/></linearGradient></defs>`;
        svg+=`<path d="${area}" fill="url(#ag)"/>`;
        svg+=`<path d="${path}" fill="none" stroke="#4caf50" stroke-width="2.5" stroke-linejoin="round"/>`;
        pts.forEach((p,i)=>{
          svg+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#0a0e17" stroke="#4caf50" stroke-width="2"/>`;
          if(i===0||i===pts.length-1)svg+=`<text x="${p.x}" y="${p.y-10}" fill="#e2e8f0" font-size="11" text-anchor="middle" font-weight="600" font-family="Heebo">${p.weight}</text>`;
        });
        svg+=`</svg>`;
        html+=svg;
      }
      html+=`</div>`;

      // Stats
      if(wh.length>=2){
        const first=wh[0].weight,last=wh[wh.length-1].weight,diff=(last-first).toFixed(1);
        const diffColor=parseFloat(diff)<=0?"var(--green)":"var(--red)";
        html+=`<div class="stats-grid">
          <div class="stat-card"><div class="stat-label">התחלה</div><div class="stat-val" style="color:var(--text2)">${first}</div><div class="stat-unit">ק"ג</div></div>
          <div class="stat-card"><div class="stat-label">נוכחי</div><div class="stat-val">${last}</div><div class="stat-unit">ק"ג</div></div>
          <div class="stat-card"><div class="stat-label">שינוי</div><div class="stat-val" style="color:${diffColor}">${diff}</div><div class="stat-unit">ק"ג</div></div>
        </div>`;
      }

      // History
      html+=`<div class="history-list">`;
      wh.slice().reverse().forEach(e=>{
        html+=`<div class="history-item"><span class="history-date">${e.date}</span><span class="history-weight">${e.weight} ק"ג</span></div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  }

  html+=`</div></div>`;
  document.getElementById("app").innerHTML=html;

  if(state.editingNote){const inp=document.getElementById("noteInput");if(inp)inp.focus()}
}

function setState(k,v){state[k]=v;render()}
function toggleDetail(id){state.showDetail=state.showDetail===id?null:id;state.editingNote=null;render()}
function startEdit(id,existing){state.editingNote=id;state.noteText=existing;render()}
function updateWeightBtn(){const b=document.getElementById("weightBtn");if(b){b.className="weight-btn "+(state.weightInput?"ready":"idle")}}

// Init
openDB().then(()=>{loadDay();loadWeights()});
</script>
</body>
</html>
