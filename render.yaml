services:
  - type: web
    runtime: node
    name: fittrack-push
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: PORT
        value: 10000
